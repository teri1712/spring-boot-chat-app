logging:
  level:
    root: INFO

spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only
  datasource:
    url: jdbc:postgresql://localhost:5432/chatapp
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: redispassword

  kafka:
    bootstrap-servers: localhost:9092
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-password";

aws:
  s3:
    endpoint: http://localhost:4566

jwt:
  secret: vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl

management:
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
loki:
  url: http://localhost:3100/loki/api/v1/push
