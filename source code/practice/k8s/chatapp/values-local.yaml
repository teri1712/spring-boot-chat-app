  AWS_SECRET_ACCESS_KEY: "decade"


# --- LOCAL INGRESS CONFIGURATION ---
serviceMonitor:
  enabled: true

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix