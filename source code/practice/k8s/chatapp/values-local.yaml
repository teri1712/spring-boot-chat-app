# LOCAL-ONLY Overrides for Kind
replicaCount: 3

env:
  SPRING_PROFILES_ACTIVE: "prod"
  DATABASE_USERNAME: "root"
  KAFKA_PROPERTIES_USER: "user"
  KAFKA_PROPERTIES_PASSWORD: "user-password"
  JWT_SECRET: "vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl-vcl"
