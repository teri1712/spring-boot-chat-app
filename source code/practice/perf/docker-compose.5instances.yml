      - ./logs:/logs
    depends_on:

      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health/readiness -u admin:admin || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 5


  server4:
