services:
  backend1:
    image: teri1712/chat-app
    environment: &backend-env
      LOGGING_LEVEL_ROOT: WARN
      SPRING_PROFILES_ACTIVE: redis-cache, dev
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ACTUATOR_USER_NAME: admin
      ACTUATOR_USER_PASSWORD: admin
      ACTUATOR_USER_ROLES: OPS
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatapp
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully
    volumes:
      - ./logs:/logs
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health/readiness -u admin:admin || exit 1" ]
      start_period: 30s
      interval: 10s
      timeout: 30s
      retries: 10
  backend2:
    image: teri1712/chat-app
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully
    volumes:
      - ./logs:/logs
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health/readiness -u admin:admin || exit 1" ]
      interval: 10s
      start_period: 30s
      timeout: 30s
      retries: 10


  es-init:
    image: curlimages/curl
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./es:/es
    entrypoint: [ "sh", "-c", "cd /es && sh ./init.sh" ]
    networks:
      - backend
  client:
    image: teri1712/chat-app-client
    ports:
      - "4200:80"
    networks:
      - backend

  server:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    external: true