filebeat.inputs:
  - type: filestream
    id: chat-app-logs
    paths:
      - /logs/*.log
    parsers:
      - ndjson:
          overwrite_keys: true
          add_error_key: true

processors:
  - add_host_metadata: ~

output.elasticsearch:
  hosts: [ "http://elasticsearch:9200" ]



setup.kibana:
  host: "localhost:5601"