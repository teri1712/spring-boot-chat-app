name: CD Template

on:
    workflow_call:
        inputs:
            GKE_CLUSTER:
                required: true
                type: string
            GKE_LOCATION:
                required: true
                type: string
            PROJECT_ID:
                required: true
                type: string
            ENV:
                required: true
                type: string

permissions:
    contents: read
    id-token: write

jobs:
    build-artifacts:
        runs-on: ubuntu-latest

        env:
            IMAGE_REPO: teri1712/t1ichat-server

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: teri1712
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build image
              working-directory: .
              run: |
                  docker build \
                    -t "${IMAGE_REPO}:latest" \
                    -t "${IMAGE_REPO}:${{ github.sha }}" \
                    .

            - name: Push image tags
              run: |
                  docker push "${IMAGE_REPO}:latest"
                  docker push "${IMAGE_REPO}:${{ github.sha }}"

    deploy:
        needs: build-artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 20

        env:
            GKE_CLUSTER: ${{ inputs.GKE_CLUSTER }}
            GKE_LOCATION: ${{ inputs.GKE_LOCATION }}
            PROJECT_ID: ${{ inputs.PROJECT_ID }}
            DEPLOY_ENV: ${{ inputs.ENV }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.SERVICE_ACCOUNT }}

            - name: Get GKE Credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: ${{ env.GKE_CLUSTER }}
                  project_id: ${{ env.PROJECT_ID }}
                  location: ${{ env.GKE_LOCATION }}

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                  version: v3.14.0
            - name: Add Helm Repo
              run: |
                 helm repo add bitnami https://charts.bitnami.com/bitnami
                 helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
                 helm repo add grafana-community https://grafana-community.github.io/helm-charts
                 helm repo add minio https://charts.min.io
                
                 helm repo update
            - name: Deploy Infrastructure
              run: |
                  helm dependency build ./k8s/infra
                  helm upgrade --install infra ./k8s/infra \
                    -f ./k8s/infra/values-gke.yaml \
                    -f ./k8s/infra/values-${{ env.DEPLOY_ENV }}.yaml \
                    --wait --timeout 10m

            - name: Deploy Observability
              run: |
                  helm dependency build ./k8s/observability
                  helm upgrade --install observability ./k8s/observability \
                    -f ./k8s/observability/values-gke.yaml \
                    --wait --timeout 10m

            - name: Deploy Chat App
              run: |
                  helm dependency build ./k8s/chatapp
                  helm upgrade --install chatapp ./k8s/chatapp \
                    -f ./k8s/chatapp/values-gke.yaml \
                    -f ./k8s/chatapp/values-${{ env.DEPLOY_ENV }}.yaml \
                    --set image.tag=${{ github.sha }} \
                    --wait --timeout 10m
