name: CD - Spring Boot Chat App

on:
    push:
        branches:
            - master

jobs:
    build-artifacts:
        runs-on: ubuntu-latest

        env:
            IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/chat-app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set image tag
              run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

            - name: Build image
              working-directory: ./source code/practice
              run: |
                  docker build \
                    -t "${IMAGE_REPO}:latest" \
                    -t "${IMAGE_REPO}:${IMAGE_TAG}" \
                    .

            - name: Push image tags
              run: |
                  docker push "${IMAGE_REPO}:latest"
                  docker push "${IMAGE_REPO}:${IMAGE_TAG}"

    google-cloud-deployment:
        needs: build-artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read

        env:
            IMAGE_TAG: ${{ github.sha }}

        steps:
            - name: Deploy to VM
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.GOOGLE_CLOUD_HOST }}
                  username: ${{ secrets.GOOGLE_CLOUD_USER }}
                  key: ${{ secrets.GOOGLE_CLOUD_SSH_KEY }}
                  script_stop: true
                  script: |
                      set -euo pipefail
                      
                      cd ~/app/spring-boot-chat-app/source\ code/practice
                      
                      git fetch origin master
                      git checkout master
                      git reset --hard origin/master
                      
                      cd ./prometheus
                      envsubst < prometheus.yml.template > prometheus.yml
                      cd ..
                      
                      export IMAGE_TAG=${{ env.IMAGE_TAG }}
                      docker pull teri1712/chat-app:${IMAGE_TAG}
                      docker pull teri1712/chat-app:latest
                      
                      docker compose -f docker-compose.infra.yml -f docker-compose.production.yml pull
                      docker compose -f docker-compose.infra.yml -f docker-compose.production.yml up -d --remove-orphans
                      
                      docker image prune -f
