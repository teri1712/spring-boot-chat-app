name: CD Template

on:
    workflow_call:
        inputs:
            GKE_CLUSTER:
                required: true
                type: string
            FRONTEND:
                required: true
                type: string

permissions:
  contents: read
  id-token: write

jobs:
    build-artifacts:
        runs-on: ubuntu-latest

        env:
            IMAGE_REPO: teri1712/t1chat-server

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: teri1712
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build image
              working-directory: .
              run: |
                  docker build \
                    -t "${IMAGE_REPO}:latest" \
                    -t "${IMAGE_REPO}:${{ github.sha }}" \
                    .

            - name: Push image tags
              run: |
                  docker push "${IMAGE_REPO}:latest"
                  docker push "${IMAGE_REPO}:${{ github.sha }}"

    deploy:
        needs: build-artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 20
        
        env:
            GKE_CLUSTER: ${{ inputs.GKE_CLUSTER }}
            FRONTEND: ${{ inputs.FRONTEND }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
                service_account: ${{ secrets.SERVICE_ACCOUNT }}

            - name: Get GKE Credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: ${{ env.GKE_CLUSTER }}

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                  version: v3.14.0

            - name: Deploy Infrastructure
              run: |
                  helm upgrade --install infra ./k8s/infra \
                    -f ./k8s/infra/values-prod.yaml \
                    --wait --timeout 10m

            - name: Deploy Observability
              run: |
                  helm upgrade --install observability ./k8s/observability \
                    -f ./k8s/observability/values-prod.yaml \
                    --wait --timeout 10m

            - name: Deploy Chat App
              run: |
                  helm upgrade --install chatapp ./k8s/chatapp \
                    -f ./k8s/chatapp/values-prod.yaml \
                    --set image.tag=${{ github.sha }} \
                    --set env.FRONTEND=${{ env.FRONTEND }} \
                    --wait --timeout 10m
