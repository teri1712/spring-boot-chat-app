name: CD - Spring Boot Chat App

on:
    push:
        branches: [master]

jobs:
    build-artifacts:
        runs-on: ubuntu-latest

        env:
            IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/chat-app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set image tag
              run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

            - name: Build image
              working-directory: .
              run: |
                  docker build \
                    -t "${IMAGE_REPO}:latest" \
                    -t "${IMAGE_REPO}:${IMAGE_TAG}" \
                    .

            - name: Push image tags
              run: |
                  docker push "${IMAGE_REPO}:latest"
                  docker push "${IMAGE_REPO}:${IMAGE_TAG}"

    deploy-to-gke:
        needs: build-artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read

        env:
            IMAGE_TAG: ${{ github.sha }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Get GKE Credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: ${{ secrets.GKE_CLUSTER }}
                  location: ${{ secrets.GKE_ZONE }}

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                  version: v3.14.0

            - name: Deploy Infrastructure
              run: |
                  helm upgrade --install infra ./k8s/infra \
                    --namespace default \
                    -f ./k8s/infra/values-prod.yaml \
                    --wait --timeout 10m

            - name: Deploy Observability
              run: |
                  helm upgrade --install observability ./k8s/observability \
                    --namespace default \
                    -f ./k8s/observability/values-prod.yaml \
                    --wait --timeout 10m

            - name: Deploy Chat App
              run: |
                  helm upgrade --install chatapp ./k8s/chatapp \
                    --namespace default \
                    -f ./k8s/chatapp/values-prod.yaml \
                    --set image.tag=${{ env.IMAGE_TAG }} \
                    --wait --timeout 10m
