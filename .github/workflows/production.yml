name: CD - Production

on:
    push:
        branches: [ master ]

permissions:
    contents: read
    id-token: write


jobs:
    deploy:
        uses: ./.github/workflows/cd.yml
        with:
            GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
            GKE_LOCATION: ${{ vars.GKE_LOCATION }}
            PROJECT_ID: ${{ vars.PROJECT_ID }}
            FRONTEND: ${{ vars.PROD_FRONTEND }}
        secrets: inherit
