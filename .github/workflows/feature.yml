name: Spring Boot Chat Application CI with Maven

on:
    pull_request:
        branches: [ master ]
    push:
        branches-ignore: [ master ]
jobs:
    clean-and-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            # Set up JDK 17 and cache Maven dependencies
            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: 'maven'
            -   name: Build and test with Maven
                working-directory: "./source code/practice"
                run: mvn -B clean surefire-report:report

            -   name: Report jacoco coverage
                uses: codecov/codecov-action@v3
                with:
                    files: ./source code/practice/target/site/jacoco/jacoco.xml
                    token: ${{ secrets.CODECOV_TOKEN }}
                    fail_ci_if_error: true