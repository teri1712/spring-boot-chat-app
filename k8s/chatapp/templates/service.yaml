apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatapp.fullname" . }}
  annotations:
    cloud.google.com/backend-config: '{"default": "{{ include "chatapp.fullname" . }}-hc"}'
    cloud.google.com/neg: '{"ingress": true}'
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: management
      protocol: TCP
      name: management
  selector:
    {{- include "chatapp.selectorLabels" . | nindent 4 }}
