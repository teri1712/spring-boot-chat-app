{{- if and .Values.ingress.enabled (eq .Values.ingress.className "gce") .Values.ingress.managedCertificate.enabled -}}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ include "chatapp.fullname" . }}-cert
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
spec:
  domains:
    {{- range .Values.ingress.managedCertificate.domains }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
