# GKE Production Profile - App
replicaCount: 3

service:
  type: NodePort

image:
  tag: "latest"
  pullPolicy: Always

resources:
  limits:
    cpu: 700m
    memory: 1Gi
  requests:
    cpu: 400m
    memory: 512Mi

ingress:
  className: "gce"
  annotations:
    kubernetes.io/ingress.allow-http: "false"
  managedCertificate:
    enabled: true
  tls: []

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
